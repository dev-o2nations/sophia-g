<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>SOPHIA-G — Born to celebrate all layers of you.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Dynamic CSS loader — bypasses every layer of caching -->
  <script>
    (function () {
      var t = Date.now();
      var sheets = [
        "css/variables.css",
        "css/animations.css",
        "components/header/header.css",
        "components/hero/hero.css",
        "components/welcome/welcome.css",
        "components/collections/collections.css",
        "components/services/services.css",
        "components/subscribe/subscribe.css",
        "components/footer/footer.css",
        "components/scroll-top/scroll-top.css"
      ];
      sheets.forEach(function (href) {
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href + "?v=" + t;
        document.head.appendChild(link);
      });
    })();
  </script>
</head>

<body>

  <!-- ░░ Component slots — filled by js/loader.js ░░ -->

  <div data-component="header"></div>

  <!-- Hero sits outside the pattern wrapper — needs a clean dark canvas -->
  <div data-component="hero"></div>

  <!-- Light sections (white page band) -->
  <main class="sophia-page">
    <div data-component="welcome"></div>
    <div data-component="collections"></div>
    <div data-component="services"></div>
    <div data-component="subscribe"></div>
  </main>

  <div data-component="footer"></div>
  <div data-component="scroll-top"></div>

  <!-- Dynamic JS loader — cache-busted on every page load, order preserved -->
  <script>
    (function () {
      var t = Date.now();
      /* main.js MUST finish before loader.js runs — load sequentially */
      var s1 = document.createElement("script");
      s1.src = "js/main.js?v=" + t;
      s1.onload = function () {
        var s2 = document.createElement("script");
        s2.src = "js/loader.js?v=" + t;
        document.body.appendChild(s2);
      };
      document.body.appendChild(s1);
    })();
  </script>

</body>
</html>
