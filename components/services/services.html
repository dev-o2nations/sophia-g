<section class="sophia-services" id="services">


  <!-- Section eyebrow -->
  <div class="sophia-services__header sophia-reveal">
    <span class="sophia-services__eyebrow">Our Services</span>
  </div>

  <!-- 3-column boxed grid -->
  <div class="sophia-services__grid">

    <!-- Card 1 — The House (Luxury Line) -->
    <article class="sophia-service-card sophia-reveal">
      <div class="sophia-service-card__media">
        <video
          class="sophia-service-card__video"
          src="assets/videos/Video-1.mp4"
          autoplay muted loop playsinline
          poster="assets/images/img4.jpg"
        ></video>
        <button type="button" class="sophia-service-card__vp-btn" aria-label="Pause video">
          <svg class="sophia-service-card__vp-icon sophia-service-card__vp-icon--pause" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="7" y="5" width="2.5" height="14"/>
            <rect x="14.5" y="5" width="2.5" height="14"/>
          </svg>
          <svg class="sophia-service-card__vp-icon sophia-service-card__vp-icon--play" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
        </button>
      </div>
      <div class="sophia-service-card__body">
        <div class="sophia-service-card__badge">
          <img src="assets/images/logo-long.webp" alt="SOPHIA-G" class="sophia-service-card__badge-logo">
          <em class="sophia-service-card__badge-name">House</em>
        </div>
        <a href="#" class="sophia-service-card__cta">Book an appointment</a>
      </div>
    </article>

    <!-- Card 2 — The Life (Lifestyle Line) -->
    <article class="sophia-service-card sophia-reveal">
      <div class="sophia-service-card__media">
        <video
          class="sophia-service-card__video"
          src="assets/videos/vid-3.mp4"
          autoplay muted loop playsinline
          poster="assets/images/s2.png"
        ></video>
        <button type="button" class="sophia-service-card__vp-btn" aria-label="Pause video">
          <svg class="sophia-service-card__vp-icon sophia-service-card__vp-icon--pause" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="7" y="5" width="2.5" height="14"/>
            <rect x="14.5" y="5" width="2.5" height="14"/>
          </svg>
          <svg class="sophia-service-card__vp-icon sophia-service-card__vp-icon--play" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
        </button>
      </div>
      <div class="sophia-service-card__body">
        <div class="sophia-service-card__badge">
          <img src="assets/images/logo-long.webp" alt="SOPHIA-G" class="sophia-service-card__badge-logo">
          <em class="sophia-service-card__badge-name">Life</em>
        </div>
        <a href="#" class="sophia-service-card__cta">Discover the lifestyle edit</a>
      </div>
    </article>

    <!-- Card 3 — The Atelier (Bespoke) -->
    <article class="sophia-service-card sophia-reveal">
      <div class="sophia-service-card__media">
        <video
          class="sophia-service-card__video"
          src="assets/videos/vid-2.mp4"
          autoplay muted loop playsinline
          poster="assets/images/img3.jpg"
        ></video>
        <button type="button" class="sophia-service-card__vp-btn" aria-label="Pause video">
          <svg class="sophia-service-card__vp-icon sophia-service-card__vp-icon--pause" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="7" y="5" width="2.5" height="14"/>
            <rect x="14.5" y="5" width="2.5" height="14"/>
          </svg>
          <svg class="sophia-service-card__vp-icon sophia-service-card__vp-icon--play" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
        </button>
      </div>
      <div class="sophia-service-card__body">
        <div class="sophia-service-card__badge">
          <img src="assets/images/logo-long.webp" alt="SOPHIA-G" class="sophia-service-card__badge-logo">
          <em class="sophia-service-card__badge-name">Atelier</em>
        </div>
        <a href="#" class="sophia-service-card__cta">Bespoke &amp; gifting orders</a>
      </div>
    </article>

  </div>

</section>
