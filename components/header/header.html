<header class="sophia-header" id="sophia-header">

  <!-- Left nav (desktop) / Left icons (mobile: bag + search) -->
  <div class="sophia-header__left-wrap">
    <nav class="sophia-header__left" aria-label="Primary navigation">
      <a href="#" class="sophia-header__link">
        <span class="sophia-header__plus">+</span> Contact
      </a>
      <a href="#" class="sophia-header__link">Collections</a>
    </nav>

    <!-- Mobile-only left icons: bag + search -->
    <div class="sophia-header__mobile-left">
      <button class="sophia-header__icon-btn" aria-label="Shopping bag">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18.0002 7H15.7502V5.75C15.7502 4.79 14.9702 4 14.0002 4H9.99023C9.03023 4 8.24023 4.78 8.24023 5.75V7H5.99023C4.89023 7 3.99023 7.89 3.99023 9V18C3.99023 19.1 4.88023 20 5.99023 20H17.9902C19.0902 20 19.9902 19.11 19.9902 18V9C19.9902 7.9 19.1002 7 17.9902 7H18.0002ZM9.75023 5.75C9.75023 5.61 9.86023 5.5 10.0002 5.5H14.0102C14.1502 5.5 14.2602 5.61 14.2602 5.75V7H9.76023V5.75H9.75023ZM18.5002 18.01C18.5002 18.28 18.2802 18.51 18.0002 18.51H6.00023C5.73023 18.51 5.50023 18.29 5.50023 18.01V9.01C5.50023 8.74 5.72023 8.51 6.00023 8.51H8.25023V10.01H9.75023V8.51H14.2502V10.01H15.7502V8.51H18.0002C18.2702 8.51 18.5002 8.73 18.5002 9.01V18.01Z" fill="currentColor"/></svg>
      </button>
      <button class="sophia-header__icon-btn" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 12C20 7.58 16.42 4 12 4C7.58 4 4 7.58 4 12C4 16.42 7.58 20 12 20C13.94 20 15.72 19.31 17.1 18.16L18.94 20L20 18.94L18.16 17.1C19.31 15.72 20 13.94 20 12ZM12 18.5C8.42 18.5 5.5 15.58 5.5 12C5.5 8.42 8.42 5.5 12 5.5C15.58 5.5 18.5 8.42 18.5 12C18.5 15.58 15.58 18.5 12 18.5Z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <!-- Center — logo -->
  <a href="#" class="sophia-header__brand" aria-label="SOPHIA-G Home">
    <img
      src="assets/images/logo-long.webp"
      alt="SOPHIA-G"
      class="sophia-header__logo"
    >
  </a>

  <!-- Right — icons + menu -->
  <ul class="sophia-header__actions" role="list">

    <!-- Bag (desktop only) -->
    <li class="sophia-header__desktop-only">
      <button class="sophia-header__icon-btn" aria-label="Shopping bag">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M18.0002 7H15.7502V5.75C15.7502 4.79 14.9702 4 14.0002 4H9.99023C9.03023 4 8.24023
            4.78 8.24023 5.75V7H5.99023C4.89023 7 3.99023 7.89 3.99023 9V18C3.99023 19.1 4.88023 20
            5.99023 20H17.9902C19.0902 20 19.9902 19.11 19.9902 18V9C19.9902 7.9 19.1002 7 17.9902
            7H18.0002ZM9.75023 5.75C9.75023 5.61 9.86023 5.5 10.0002 5.5H14.0102C14.1502 5.5 14.2602
            5.61 14.2602 5.75V7H9.76023V5.75H9.75023ZM18.5002 18.01C18.5002 18.28 18.2802 18.51 18.0002
            18.51H6.00023C5.73023 18.51 5.50023 18.29 5.50023 18.01V9.01C5.50023 8.74 5.72023 8.51 6.00023
            8.51H8.25023V10.01H9.75023V8.51H14.2502V10.01H15.7502V8.51H18.0002C18.2702 8.51 18.5002 8.73
            18.5002 9.01V18.01Z" fill="currentColor"/>
        </svg>
      </button>
    </li>

    <!-- Account (desktop only) -->
    <li class="sophia-header__desktop-only">
      <button class="sophia-header__icon-btn" aria-label="My account">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 14C14.76 14 17 11.76 17 9C17 6.24 14.76 4 12 4C9.24 4 7 6.24 7 9C7 11.76 9.24 14 12
            14ZM12 5.5C13.93 5.5 15.5 7.07 15.5 9C15.5 10.93 13.93 12.5 12 12.5C10.07 12.5 8.5 10.93 8.5
            9C8.5 7.07 10.07 5.5 12 5.5ZM18.75 18V20H17.25V18C17.25 17.31 16.69 16.75 16 16.75H8C7.31
            16.75 6.75 17.31 6.75 18V20H5.25V18C5.25 16.48 6.48 15.25 8 15.25H16C17.52 15.25 18.75 16.48
            18.75 18Z" fill="currentColor"/>
        </svg>
      </button>
    </li>

    <!-- Search (desktop only) -->
    <li class="sophia-header__desktop-only">
      <button class="sophia-header__icon-btn" aria-label="Search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20 12C20 7.58 16.42 4 12 4C7.58 4 4 7.58 4 12C4 16.42 7.58 20 12 20C13.94 20 15.72
            19.31 17.1 18.16L18.94 20L20 18.94L18.16 17.1C19.31 15.72 20 13.94 20 12ZM12 18.5C8.42 18.5
            5.5 15.58 5.5 12C5.5 8.42 8.42 5.5 12 5.5C15.58 5.5 18.5 8.42 18.5 12C18.5 15.58 15.58 18.5
            12 18.5Z" fill="currentColor"/>
        </svg>
      </button>
    </li>

    <!-- Theme toggle — sun/moon -->
    <li>
      <button class="sophia-header__icon-btn sophia-header__theme-btn" id="theme-toggle" aria-label="Toggle light/dark mode">
        <!-- Moon (shown in light mode — click to go dark) -->
        <svg class="sophia-theme-icon sophia-theme-icon--moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun (shown in dark mode — click to go light) -->
        <svg class="sophia-theme-icon sophia-theme-icon--sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </li>

    <!-- Menu — Gucci exact hamburger + MENU label -->
    <li>
      <button class="sophia-header__menu-btn" aria-label="Menu toggle" id="menu-icon-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20 6.5H4V5H20V6.5ZM20 11.25H4V12.75H20V11.25ZM20 17.5H4V19H20V17.5Z" fill="currentColor"/>
        </svg>
        <span class="sophia-header__menu-label">MENU</span>
      </button>
    </li>

  </ul>

</header>

<!-- ── Full-screen Nav Drawer ── -->
<div class="sg-drawer" id="nav-drawer" aria-hidden="true" role="dialog" aria-label="Navigation menu">

  <div class="sg-drawer__inner">

    <!-- Close -->
    <button class="sg-drawer__close" id="nav-close" aria-label="Close menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>

    <!-- Nav links -->
    <nav class="sg-drawer__nav">
      <a href="#" class="sg-drawer__link" style="--i:0">Collections</a>
      <a href="#" class="sg-drawer__link" style="--i:1">Services</a>
      <a href="#" class="sg-drawer__link" style="--i:2">The House</a>
      <a href="#" class="sg-drawer__link" style="--i:3"><span class="sg-drawer__plus">+</span> Contact</a>
    </nav>

    <!-- Bottom brand mark -->
    <div class="sg-drawer__foot">
      <img src="assets/images/logo-long.webp" alt="SOPHIA-G" class="sg-drawer__logo">
      <p class="sg-drawer__tagline">Born to celebrate all layers of you.</p>
    </div>

  </div>
</div>
